{% extends "base.html" %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6 m-4">
    <h2 class="text-xl font-semibold mb-4">Upload Files</h2>

    <div class="mb-6">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-4 py-2">File Name</th>
                        <th class="px-4 py-2">Form</th>
                        <th class="px-4 py-2">Category</th>
                        <th class="px-4 py-2">Status</th>
                        <th class="px-4 py-2">Password</th>
                    </tr>
                </thead>
                <tbody id="files-container">
                    <!-- Processed files will appear here -->
                </tbody>
            </table>
        </div>


    </div>

    <!-- Add New File Button -->
    <div class="flex justify-start">
        <button
            id="add-file-btn"
            class="flex items-center gap-1 text-blue-600 font-medium"
            onclick="toggleFileForm()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 00-1 1v5H4a1 1 0 100 2h5v5a1 1 0 102 0v-5h5a1 1 0 100-2h-5V4a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            Add File
        </button>
    </div>

    <!-- File Upload Form (Hidden by Default) -->
    <div id="file-form-container" class="hidden mt-4 p-4 border border-gray-200 rounded-md bg-gray-50 fade-in">
        <form
            id="upload-form"
            hx-post="/upload-file/"
            hx-encoding="multipart/form-data"
            hx-target="#files-container"
            hx-swap="beforeend"
            hx-on::after-request="resetFileForm()"
            class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">

            <div class="col-span-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Select File</label>
                <input
                    type="file"
                    name="file"
                    required
                    class="block w-full text-sm text-gray-500
                           file:mr-4 file:py-2 file:px-4
                           file:rounded-md file:border-0
                           file:text-sm file:font-semibold
                           file:bg-blue-50 file:text-blue-700
                           hover:file:bg-blue-100">
            </div>

            <div class="col-span-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Form Name</label>
                <select
                    name="form_name"
                    required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                    <option value="106" selected>106</option>
                    <option value="161">161</option>
                    <option value="837">837</option>
                    <option value="857">857</option>
                    <option value="134">134</option>
                    <option value="858">858</option>
                    <option value="867">867</option>
                    <option value="867ג">867ג</option>
                </select>
            </div>

            <div class="col-span-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select
                    name="category"
                    required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                    <option value="main" selected>Main</option>
                    <option value="partner">Partner</option>
                </select>
            </div>

            <div class="col-span-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">PDF Password</label>
                <input
                        type="password"
                        name="pdf_password"
                        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                        placeholder="Leave empty if no password">
            </div>

            <div class="col-span-1">
            <button
                    type="submit"
                    class="w-full py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Upload
                </button>
            </div>
        </form>
    </div>
</div>
<div class="mt-4 flex justify-center">
    <button onclick="triggerAutoFill()" 
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
        Open Auto-Fill Browser
    </button>
</div>
<div id="stats-container"  class="bg-white rounded-lg shadow-md p-6 m-4" ></div>

<script>
    function toggleFileForm() {
        const formContainer = document.getElementById('file-form-container');
        const isHidden = formContainer.classList.contains('hidden');

        if (isHidden) {
            formContainer.classList.remove('hidden');
        } else {
            formContainer.classList.add('hidden');
        }
    }

    function resetFileForm() {
        document.getElementById('upload-form').reset();

        // Don't hide the form, so the user can add multiple files easily
        // If you want to hide it, uncomment the next line
        // document.getElementById('file-form-container').classList.add('hidden');
    }

    function triggerAutoFill() {
    fetch('/auto-fill/', {
        method: 'POST',
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'error') {
            alert('Error: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error occurred while trying to auto-fill');
    });
}
</script>
{% endblock %}
